name: mcpregistry
metadata:
  template: azd-init

services:
  web:
    project: ./src/MCPRegistry
    language: dotnet
    host: containerapp
    docker:
      path: ./src/MCPRegistry/Dockerfile

hooks:
  postprovision:
    posix:
      shell: sh
      run: ./scripts/grant-sql-access.sh
    windows:
      shell: pwsh
      run: ./scripts/grant-sql-access.ps1
