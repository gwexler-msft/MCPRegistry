# Destructive clean redeploy of the MCP Registry stack:
#   1. azd down --force --purge   (deletes RG + soft-deleted KV/etc.)
#   2. azd up                     (provisions infra fresh, then deploys images)
#
# Manual trigger only. Requires typed confirmation matching the env name to
# guard against accidental purges of long-lived environments.
#
# See azd-deploy.yml for the full list of required GitHub variables.

name: azd clean redeploy (teardown + up)

on:
  workflow_dispatch:
    inputs:
      env_name:
        description: "azd environment name to tear down + rebuild"
        required: true
        default: "dev"
      confirm:
        description: "Type the env name again to confirm destructive purge"
        required: true
        default: ""
      location:
        description: "Azure region (overrides AZURE_LOCATION var)"
        required: false
        default: ""

permissions:
  id-token: write
  contents: read

concurrency:
  group: azd-clean-redeploy-${{ github.event.inputs.env_name }}
  cancel-in-progress: false

jobs:
  clean-redeploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: azd
    env:
      AZURE_ENV_NAME: ${{ github.event.inputs.env_name }}
      AZURE_LOCATION: ${{ github.event.inputs.location || vars.AZURE_LOCATION }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
    steps:
      - name: Verify confirmation matches env name
        # Fail fast before any cloud work if the operator didn't type the env name back.
        working-directory: .
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "${{ github.event.inputs.env_name }}" ]; then
            echo "::error::Confirmation '${{ github.event.inputs.confirm }}' does not match env_name '${{ github.event.inputs.env_name }}'. Aborting."
            exit 1
          fi
          echo "Confirmed clean redeploy of env: ${{ github.event.inputs.env_name }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Install SqlPackage
        run: dotnet tool install --global Microsoft.SqlPackage

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: azd login (OIDC)
        run: |
          azd auth login \
            --client-id "${{ vars.AZURE_CLIENT_ID }}" \
            --federated-credential-provider github \
            --tenant-id "${{ vars.AZURE_TENANT_ID }}"

      - name: Make hook scripts executable
        run: chmod +x scripts/*.sh

      - name: Create or select azd env
        run: |
          if azd env select "$AZURE_ENV_NAME" 2>/dev/null; then
            echo "Selected existing azd env: $AZURE_ENV_NAME"
          else
            azd env new "$AZURE_ENV_NAME" \
              --location "$AZURE_LOCATION" \
              --subscription "$AZURE_SUBSCRIPTION_ID" \
              --no-prompt
          fi

      - name: Seed azd env from GitHub variables
        env:
          AZURE_PRINCIPAL_ID: ${{ vars.AZURE_PRINCIPAL_ID }}
          AZURE_PRINCIPAL_NAME: ${{ vars.AZURE_PRINCIPAL_NAME }}
          AZURE_WORKLOAD_NAME: ${{ vars.AZURE_WORKLOAD_NAME }}
          AZURE_RESOURCE_GROUP_NAME: ${{ vars.AZURE_RESOURCE_GROUP_NAME }}
        run: |
          set_if() {
            local key="$1"
            local value="$2"
            if [ -n "$value" ]; then
              azd env set "$key" "$value"
            fi
          }
          set_if AZURE_TENANT_ID            "$AZURE_TENANT_ID"
          set_if AZURE_SUBSCRIPTION_ID      "$AZURE_SUBSCRIPTION_ID"
          set_if AZURE_LOCATION             "$AZURE_LOCATION"
          set_if AZURE_PRINCIPAL_ID         "$AZURE_PRINCIPAL_ID"
          set_if AZURE_PRINCIPAL_NAME       "$AZURE_PRINCIPAL_NAME"
          set_if AZURE_WORKLOAD_NAME        "$AZURE_WORKLOAD_NAME"
          set_if AZURE_RESOURCE_GROUP_NAME  "$AZURE_RESOURCE_GROUP_NAME"

      - name: azd down (purge RG + soft-deleted resources)
        # No-op if the env was never provisioned; tolerate "nothing to delete" errors
        # so a first-time run of this workflow still proceeds to provision.
        run: azd down --force --purge --no-prompt || echo "azd down returned non-zero (likely nothing to delete) \u2014 continuing."

      - name: azd up (provision + deploy)
        run: azd up --no-prompt
