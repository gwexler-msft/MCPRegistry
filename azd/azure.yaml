name: mcpregistry
metadata:
  template: azd-init

infra:
  path: ./infra

services:
  web:
    project: ../src/MCPRegistry
    language: dotnet
    host: containerapp
    docker:
      path: ./Dockerfile
      remoteBuild: true
      # comment this out if you want to have a debug image instead of a release config
      # buildArgs:
      #   - BUILD_CONFIGURATION=Debug
  ui:
    project: ../src/MCPRegistry.UI
    language: dotnet
    host: containerapp
    docker:
      path: ./Dockerfile
      context: ../../
      remoteBuild: true
      # comment this out if you want to have a debug image instead of a release config
      # buildArgs:
      #   - BUILD_CONFIGURATION=Debug

hooks:
  postprovision:
    posix:
      shell: sh
      run: |
        ./scripts/deploy-db.sh
        ./scripts/grant-sql-access.sh
    windows:
      shell: pwsh
      run: |
        ./scripts/deploy-db.ps1
        ./scripts/grant-sql-access.ps1
  postdeploy:
    posix:
      shell: sh
      run: ./scripts/curl-test.sh
    windows:
      shell: pwsh
      run: ./scripts/curl-test.ps1
