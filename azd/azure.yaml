name: mcpregistry
metadata:
  template: azd-init

infra:
  path: ./infra

services:
  web:
    project: ../src/MCPRegistry
    language: dotnet
    host: containerapp
    docker:
      path: ../src/MCPRegistry/Dockerfile
  ui:
    project: ../src/MCPRegistry.UI
    language: dotnet
    host: containerapp
    docker:
      path: ../src/MCPRegistry.UI/Dockerfile
      context: ../src/MCPRegistry.UI

hooks:
  prepackage:
    posix:
      shell: sh
      run: cp ../data/sample-seed-data.json ../src/MCPRegistry.UI/wwwroot/sample-seed-data.json 2>/dev/null || true
    windows:
      shell: pwsh
      run: Copy-Item ../data/sample-seed-data.json ../src/MCPRegistry.UI/wwwroot/sample-seed-data.json -ErrorAction SilentlyContinue
  postprovision:
    posix:
      shell: sh
      run: |
        ./scripts/deploy-db.sh
        ./scripts/grant-sql-access.sh
    windows:
      shell: pwsh
      run: |
        ./scripts/deploy-db.ps1
        ./scripts/grant-sql-access.ps1
