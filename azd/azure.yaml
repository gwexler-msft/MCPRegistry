name: mcpregistry
metadata:
  template: azd-init

infra:
  path: ./infra

services:
  web:
    project: ../src/MCPRegistry
    language: dotnet
    host: containerapp
    docker:
      path: ../src/MCPRegistry/Dockerfile

hooks:
  postprovision:
    posix:
      shell: sh
      run: |
        ./scripts/deploy-db.sh
        ./scripts/grant-sql-access.sh
    windows:
      shell: pwsh
      run: |
        ./scripts/deploy-db.ps1
        ./scripts/grant-sql-access.ps1
